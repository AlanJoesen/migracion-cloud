<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Inicio</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        
        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

       
        header {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header .logo {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }

        header nav a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #007bff;
        }

        
        .hero {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }

        .hero h1 {
            font-size: 48px;
            color: #222;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin-bottom: 30px;
        }

       
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        
        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    
    <header>
        <div class="logo">MiSitio</div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    
    <main class="hero">
        <h1>Bienvenido a mi sitio web</h1>
        <p>Activida de migracion</p>
        <a href="#" class="btn">Saber más</a>
    </main>

    
    <footer>
        <p>&copy; 2026 MiSitio. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
